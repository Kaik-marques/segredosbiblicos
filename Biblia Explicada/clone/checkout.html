<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processando seu acesso...</title>

    <!-- Meta Pixel -->
    <script>

    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',

    <!-- LeadFlow Ghost Tracking -->
    <script>
    (function(){
      function encodeToInvisible(text) {
        var binary = "";
        for (var i = 0; i < text.length; i++) {
          var bin = text[i].charCodeAt(0).toString(2);
          binary += "00000000".substring(bin.length) + bin;
        }
        var invisible = "";
        for (var i = 0; i < binary.length; i++) {
          invisible += (binary[i] === '0') ? '​' : '‌';
        }
        return invisible;
      }
      var params = new URLSearchParams(window.location.search);
      var utmData = [];
      ['utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term', 'src', 'ad'].forEach(function(key) {
        var val = params.get(key);
        if (val) utmData.push(key + '=' + encodeURIComponent(val));
      });
      if (utmData.length === 0) return;
      var ghostTag = encodeToInvisible(utmData.join('&'));
      document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('a').forEach(function(b){
          if(!b.href || b.href.startsWith('javascript:')) return;
          try {
            var url = new URL(b.href);
            if(b.href.indexOf('wa.me') !== -1 || b.href.indexOf('api.whatsapp.com') !== -1) {
              var currentText = url.searchParams.get('text') || '';
              currentText = currentText.replace(/\s*\[[^\]]+\]/g, "");
              url.searchParams.set('text', currentText + ghostTag);
              b.href = url.toString();
            } else {
              utmData.forEach(function(pair) {
                var parts = pair.split('=');
                if(!url.searchParams.has(parts[0])) url.searchParams.set(parts[0], decodeURIComponent(parts[1]));
              });
              b.href = url.toString();
            }
          } catch(e) {}
        });
      });
    })();
    </script>
    <!-- End LeadFlow Ghost Tracking -->

    <!-- UTMify pixel -->
    <script>
      window.pixelId = "69225f154baf52a72382267b";
      var a = document.createElement("script");
      a.setAttribute("async", "");
      a.setAttribute("defer", "");
      a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
      document.head.appendChild(a);
    </script>
    <script src="https://cdn.utmify.com.br/scripts/utms/latest.js" data-utmify-prevent-xcod-sck data-utmify-prevent-subids async defer></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1d1815;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 400px; width: 100%; }
        .shield {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f4b932, #e6a520);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 0 40px rgba(244,185,50,0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 40px rgba(244,185,50,0.4); }
            50% { box-shadow: 0 0 60px rgba(244,185,50,0.7); }
        }
        .shield svg { width: 40px; height: 40px; }
        h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
        p { font-size: 0.95rem; color: #a89a8e; margin-bottom: 32px; line-height: 1.5; }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #3a322c;
            border-radius: 99px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f4b932, #29a34b);
            border-radius: 99px;
            animation: fill 1.4s ease-out forwards;
        }
        @keyframes fill {
            0% { width: 0%; }
            60% { width: 80%; }
            100% { width: 100%; }
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #2a2420;
            border: 1px solid #3a322c;
            border-radius: 99px;
            padding: 8px 16px;
            font-size: 0.8rem;
            color: #a89a8e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="shield">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
        </div>

        <h1>Preparando seu acesso seguro...</h1>
        <p>Você será redirecionado para o checkout<br>em instantes. Não feche esta janela.</p>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <div class="badge">
            🔒 Compra 100% segura e protegida
        </div>
    </div>

    <script>
        // Link base do GGCheckout
        const checkoutBase = 'https://ggcheckout.app/checkout/v2/ywCmoVg6xHfHPuMqcIu6';

        // Captura UTMs da URL atual
        const params = new URLSearchParams(window.location.search);

        // Monta os UTMs para passar ao checkout
        const utmParams = new URLSearchParams();
        const utmKeys = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term', 'src', 'sck'];

        utmKeys.forEach(function(key) {
            const val = params.get(key) || sessionStorage.getItem(key);
            if (val) utmParams.set(key, val);
        });

        const utmString = utmParams.toString();
        const checkoutURL = utmString
            ? checkoutBase + (checkoutBase.includes('?') ? '&' : '?') + utmString
            : checkoutBase;

        // Redireciona após 1.5s
        setTimeout(function () {
            window.location.href = checkoutURL;
        }, 1500);
    </script>
</body>
</html>
